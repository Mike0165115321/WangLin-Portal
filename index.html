<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WangLin Portal</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{
  display:flex;align-items:center;justify-content:center;
  cursor:default;user-select:none;
  background:#0a0a12;
}

/* ===== NATURE BACKGROUND ===== */
.bg-image{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
  background:url('https://images.unsplash.com/photo-1511497584788-876760111969?w=1920&q=80') center/cover no-repeat;
  animation:zoomBg 20s ease-in-out infinite alternate;
}
@keyframes zoomBg{
  0%{transform:scale(1)}
  100%{transform:scale(1.08)}
}

/* ===== DARK OVERLAY ===== */
.dark-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.35) 50%,rgba(0,0,0,0.55) 100%),
    radial-gradient(ellipse 60% 50% at 50% 50%,rgba(0,0,0,0) 40%,rgba(0,0,0,0.25) 100%);
}

/* ===== SUBTLE AMBIENT OVERLAY ===== */
.ambient-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(60,120,60,0.10),transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 80%,rgba(100,180,200,0.08),transparent 60%),
             radial-gradient(ellipse 40% 40% at 50% 30%,rgba(200,180,100,0.05),transparent 50%);
  animation:ambientShift 10s ease-in-out infinite alternate;
}
@keyframes ambientShift{
  0%{opacity:0.6}
  50%{opacity:1}
  100%{opacity:0.6}
}

/* ===== CANVAS PARTICLES ===== */
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* ===== MAIN CONTAINER ===== */
.container{position:relative;z-index:4;text-align:center;padding:2rem;width:100%;max-width:920px;
  display:flex;flex-direction:column;align-items:center;
  animation:fadeIn 1.5s ease-out;}

/* ===== HEADER — centered perfectly ===== */
.logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.brand{font-size:clamp(2.4rem,6vw,4.2rem);font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#f5e6d0,#8fbf7f,#6ab5c4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;position:relative;display:inline-block}
.brand::after{content:'WANGLIN';position:absolute;left:0;top:0;width:100%;height:100%;
  background:linear-gradient(135deg,#f5e6d0,#8fbf7f,#6ab5c4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:glitch 4s infinite;opacity:0;pointer-events:none}
@keyframes glitch{
  0%,90%,100%{opacity:0;transform:translate(0)}
  91%{opacity:0.3}
  92%{clip-path:inset(20% 0 60% 0);transform:translate(-4px,2px);opacity:0.3}
  94%{clip-path:inset(50% 0 30% 0);transform:translate(4px,-1px);opacity:0.2}
  96%{clip-path:inset(10% 0 70% 0);transform:translate(-3px,3px);opacity:0.25}
  97%{opacity:0}
}
.subtitle{font-size:clamp(0.75rem,1.5vw,1rem);color:rgba(255,255,255,0.40);letter-spacing:6px;text-transform:uppercase;margin-top:-2px;font-weight:300}
.divider{width:80px;height:1px;margin:0 auto 18px;background:linear-gradient(90deg,transparent,rgba(143,191,127,0.5),transparent)}

/* ===== DATE/TIME ===== */
.time-block{margin-bottom:24px}
.time{font-size:clamp(3rem,7vw,5rem);font-weight:200;color:#fff;letter-spacing:3px;line-height:1;font-variant-numeric:tabular-nums}
.time .seconds{font-size:0.4em;color:rgba(255,255,255,0.25);vertical-align:super;margin-left:4px}
.date{font-size:clamp(0.8rem,1.3vw,1rem);color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px}

/* ===== STATS ROW ===== */
.stats-row{display:flex;justify-content:center;gap:clamp(12px,3vw,36px);margin-bottom:28px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:clamp(1rem,1.8vw,1.3rem);font-weight:700;color:rgba(255,255,255,0.85)}
.stat-label{font-size:clamp(0.6rem,0.8vw,0.75rem);color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px;margin-top:1px}

/* ===== LINK CARDS ===== */
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:700px;margin:0 auto 28px}
.card{position:relative;text-decoration:none;padding:14px 20px;border-radius:14px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:rgba(255,255,255,0.75);font-size:0.85rem;font-weight:500;letter-spacing:0.3px;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;overflow:hidden;
  min-width:100px;display:flex;align-items:center;gap:8px}
.card::before{content:'';position:absolute;inset:0;border-radius:14px;opacity:0;background:linear-gradient(135deg,rgba(143,191,127,0.15),rgba(106,181,196,0.10));
  transition:opacity 0.3s}
.card:hover{transform:translateY(-3px) scale(1.03);border-color:rgba(143,191,127,0.3);
  box-shadow:0 8px 30px rgba(106,181,196,0.15);color:#fff}
.card:hover::before{opacity:1}
.card-icon{font-size:1.2rem;position:relative;z-index:1}
.card-label{position:relative;z-index:1;white-space:nowrap}

/* ===== TAGLINE ===== */
.tagline{color:rgba(255,255,255,0.15);font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;
  animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.15}50%{opacity:0.35}}
@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

/* ===== MOUSE FOLLOWER ===== */
.glow-follower{position:fixed;width:400px;height:400px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(143,191,127,0.07),transparent 70%);
  transform:translate(-50%,-50%);transition:opacity 0.3s}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .container{padding:1rem}
  .card{padding:10px 14px;font-size:0.75rem;min-width:80px}
  .stats-row{gap:16px}
}
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="dark-overlay"></div>
<div class="ambient-overlay"></div>
<canvas id="particle-canvas"></canvas>
<div class="glow-follower" id="glowFollower"></div>

<div class="container">
  <!-- Header -->
  <div class="logo-row">
    <div class="brand">WANGLIN</div>
  </div>
  <div class="subtitle">✦ Dev Portal ✦</div>
  <div class="divider"></div>

  <!-- Time -->
  <div class="time-block">
    <div class="time" id="timeDisplay">--:--:--</div>
    <div class="date" id="dateDisplay">---</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-item"><div class="stat-num">25+</div><div class="stat-label">Projects</div></div>
    <div class="stat-item"><div class="stat-num">800+</div><div class="stat-label">Commits</div></div>
    <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">Languages</div></div>
    <div class="stat-item"><div class="stat-num">15+</div><div class="stat-label">Repos</div></div>
    <div class="stat-item"><div class="stat-num">9</div><div class="stat-label">AI Agents</div></div>
  </div>

  <!-- Cards -->
  <div class="cards">
    <a class="card" href="https://github.com/Mike0165115321" target="_blank" rel="noopener">
      <span class="card-icon">⌂</span><span class="card-label">GitHub</span>
    </a>
    <a class="card" href="https://obsidian.md" target="_blank" rel="noopener">
      <span class="card-icon">◇</span><span class="card-label">Obsidian</span>
    </a>
    <a class="card" href="https://www.framer.com" target="_blank" rel="noopener">
      <span class="card-icon">◆</span><span class="card-label">Framer</span>
    </a>
    <a class="card" href="https://www.deepseek.com" target="_blank" rel="noopener">
      <span class="card-icon">◎</span><span class="card-label">DeepSeek</span>
    </a>
    <a class="card" href="https://github.com/Mike0165115321/Aetox" target="_blank" rel="noopener">
      <span class="card-icon">◉</span><span class="card-label">Aetox</span>
    </a>
    <a class="card" href="https://chatgpt.com" target="_blank" rel="noopener">
      <span class="card-icon">○</span><span class="card-label">ChatGPT</span>
    </a>
    <a class="card" href="https://claude.ai" target="_blank" rel="noopener">
      <span class="card-icon">◌</span><span class="card-label">Claude</span>
    </a>
  </div>

  <!-- Tagline -->
  <div class="tagline">✦ ท่ามกลางธรรมชาติ สู่วงการ AI ✦</div>
</div>

<script>
// ===== CLOCK — ภาษาไทย =====
const thaiMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                    'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const thaiDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('timeDisplay').innerHTML=`${h}:${m}<span class="seconds">${s}</span>`;
  const d=thaiDays[n.getDay()];
  const day=n.getDate();
  const month=thaiMonths[n.getMonth()];
  const year=n.getFullYear()+543;
  document.getElementById('dateDisplay').textContent=`วัน${d}ที่ ${day} ${month} ${year}`;
}
updateClock();
setInterval(updateClock,1000);

// ===== PARTICLES — Canvas =====
const canvas=document.getElementById('particle-canvas');
const ctx=canvas.getContext('2d');
let particles=[];
const PARTICLE_COUNT=80;

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

class Particle{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.size=Math.random()*2.5+0.5;
    this.speedX=(Math.random()-0.5)*0.3;
    this.speedY=(Math.random()-0.5)*0.3;
    this.opacity=Math.random()*0.5+0.1;
    this.hue=Math.random()*40+80; // green-gold range for nature vibe
  }
  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    if(this.x<0||this.x>canvas.width)this.speedX*=-1;
    if(this.y<0||this.y>canvas.height)this.speedY*=-1;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},70%,60%,${this.opacity})`;
    ctx.fill();
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<PARTICLE_COUNT;i++)particles.push(new Particle());
}
initParticles();

// Connection lines
function drawConnections(){
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<150){
        const opacity=(1-dist/150)*0.15;
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`hsla(110,40%,70%,${opacity})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw()});
  drawConnections();
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== MOUSE FOLLOWER =====
const follower=document.getElementById('glowFollower');
let mouseX=window.innerWidth/2,mouseY=window.innerHeight/2;
let currentX=mouseX,currentY=mouseY;

document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

function animateFollower(){
  currentX+=(mouseX-currentX)*0.05;
  currentY+=(mouseY-currentY)*0.05;
  follower.style.left=currentX+'px';
  follower.style.top=currentY+'px';
  requestAnimationFrame(animateFollower);
}
animateFollower();

// ===== KEYBOARD SHORTCUT — F11 Fullscreen =====
document.addEventListener('keydown',e=>{
  if(e.key==='f'||e.key==='F'){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Console Easter Egg
console.log('%c✦ WangLin Portal ✦','font-size:24px;font-weight:bold;color:#8fbf7f');
console.log('%cท่ามกลางธรรมชาติ สู่วงการ AI 🌿','font-size:14px;color:#6ab5c4');
console.log('%c25+ Projects · 800+ Commits · 8 Languages · 9 AI Agents','font-size:12px;color:rgba(255,255,255,0.5)');
</script>
</body>
</html>
